name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: mohamedrabeez/great-outdoors-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: mohamedrabeez/great-outdoors-frontend:latest

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd /home/rabeeztgo/The-Great-Outdoors-Ecommerce
            docker pull mohamedrabeez/great-outdoors-backend:latest
            docker pull mohamedrabeez/great-outdoors-frontend:latest
            docker-compose up -d

      - name: Run API Tests
        run: |
          pip install requests pytest
          pytest tests/test_website.py -v